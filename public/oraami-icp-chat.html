<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oraami — Building your ICP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --card-bg: #0b0c0f;
    --navy: #171c2c;
    --navy-line: rgba(255,255,255,0.06);
    --signal-1: #FF5702;
    --signal-2: #FF5702;
    --text-0: #f4f4f2;
    --text-1: #b7b9c2;
    --text-2: #7d7f89;
    --green: #34d399;
    --border: rgba(255,255,255,0.09);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%;
    height:100%;
    background:var(--bg);
    overflow:hidden;
  }
  body{
    font-family:'Inter', sans-serif;
    color:var(--text-0);
    display:flex;
    align-items:stretch;
    justify-content:stretch;
    min-height:100%;
    padding:0;
    position:relative;
    overflow:hidden;
  }

  .ambient{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 520px 420px at 10% 88%, rgba(255,90,31,0.16), transparent 60%),
      radial-gradient(ellipse 460px 380px at 92% 8%, rgba(91,124,250,0.10), transparent 60%);
  }

  .frame{
    position:relative;
    width:100%;
    height:100%;
    max-width:none;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 40%), var(--card-bg);
    border:0;
    border-radius:16px;
    overflow:hidden;
    box-shadow:none;
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    min-height:56px;
    padding:14px 18px;
    border-bottom:1px solid var(--navy-line);
  }
  .logo{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:-0.01em;
    color:var(--text-0);
  }
  .logo svg{ display:block; width:22px; height:22px; }
  .logo .ring{
  width:22px;
  height:22px;
  transform-origin:center;
  animation:spin-ring 2.4s linear infinite;
  display:block;
}
  @keyframes spin-ring{
  to{
    transform:rotate(360deg);
  }
}
  .logo .spark{
    animation: spark-pulse 1.6s ease-in-out infinite;
    transform-origin: 20px 7.4px;
  }
  @keyframes spark-pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.55; transform:scale(0.75); }
  }

  .status{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--green);
  }
  .status .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px 1px rgba(52,211,153,0.5);
    animation: pulse-dot 1.6s ease-in-out infinite;
  }
  @keyframes pulse-dot{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.5; transform:scale(0.8); }
  }

  .body{
    flex: 1;
    padding: 16px 18px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
}

  .row{
    display:flex;
    width:100%;
  }
  .row.ai{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  .bubble{
  max-width:78%;
  padding:9px 12px;
  border-radius:12px;
  font-size:12.5px;
  line-height:1.35;
  opacity:0;
  transform:none;
}
  .bubble.show{
    animation: pop-in 0.5s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes pop-in{
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .bubble.ai{
    background: var(--navy);
    color: var(--text-0);
    border:1px solid var(--navy-line);
    border-bottom-left-radius:5px;
  }
  .bubble.user{
    background: linear-gradient(135deg, var(--signal-1), var(--signal-2));
    color:#ffff;
    font-weight:500;
    border-bottom-right-radius:5px;
  }

  .typing{
    display:flex;
    align-items:center;
    gap:5px;
    padding:10px 12px;
    border-radius:12px;
    background: var(--navy);
    border:1px solid var(--navy-line);
    width:fit-content;
    opacity:0;
  }
  .typing.show{ animation: pop-in 0.35s ease forwards; }
  .typing.hide{ animation: fade-out 0.25s ease forwards; }
  @keyframes fade-out{ to{ opacity:0; transform:scale(0.9); } }
  .typing span{
    width:6px; height:6px;
    border-radius:50%;
    background: var(--text-1);
    animation: bounce 1.1s ease-in-out infinite;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{
    0%,60%,100%{ transform:translateY(0); opacity:0.5; }
    30%{ transform:translateY(-4px); opacity:1; }
  }

  .row.ai .typing{ border-bottom-left-radius:5px; }
  .row.user .typing{ border-bottom-right-radius:5px; margin-left:auto; }

  .generating{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 13px;
    border-radius:12px;
    border-bottom-left-radius:5px;
    background: var(--navy);
    border:1px solid var(--navy-line);
    width:fit-content;
    opacity:0;
    font-size:12px;
    color:var(--text-1);
  }
  .generating.show{ animation: pop-in 0.4s ease forwards; }
  .generating.hide{ animation: fade-out 0.25s ease forwards; }
  .generating .spinner{
    width:13px; height:13px;
    border-radius:50%;
    border:2px solid rgba(255,122,61,0.25);
    border-top-color: var(--signal-1);
    animation: spin-ring 0.8s linear infinite;
    flex-shrink:0;
  }

  .icp-card{
    margin-top:4px;
    padding:14px 16px 8px;
    border-radius:12px;
    border:1px solid #FF5702;
    background:
      radial-gradient(ellipse 300px 160px at 15% 0%, rgba(255,90,31,0.14), transparent 70%),
      #0e0f14;
    opacity:0;
    transform: translateY(14px);
  }
  .icp-card.show{
    animation: pop-in 0.55s cubic-bezier(.2,.8,.2,1) forwards;
  }

  .icp-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .icp-title{
    font-weight:700;
    font-size:13.5px;
    color:var(--text-0);
  }
  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    font-weight:500;
    color:var(--green);
    background: rgba(52,211,153,0.12);
    border:1px solid rgba(52,211,153,0.3);
    padding:3px 9px;
    border-radius:100px;
  }

  .score-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:11.5px;
    color:var(--text-1);
    margin-bottom:9px;
  }
  .score-label .val{
    font-family:'JetBrains Mono', monospace;
    color:var(--signal-1);
    font-weight:500;
  }
  .bar-track{
    height:6px;
    border-radius:100px;
    background: rgba(255,255,255,0.08);
    overflow:hidden;
    margin-bottom:13px;
  }
  .bar-fill{
    height:100%;
    width:0%;
    border-radius:100px;
    background: linear-gradient(90deg, var(--signal-1), var(--signal-2));
    box-shadow: 0 0 12px 0 rgba(255,90,31,0.5);
    transition: width 1.1s cubic-bezier(.2,.8,.2,1);
  }

  .icp-stats{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .icp-stat{
    font-size:11.5px;
    color:var(--text-2);
  }
  .icp-stat b{
    color:var(--text-0);
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:12px;
    margin-left:5px;
  }

  @media (max-width:520px){
    .body{ padding:14px 14px 16px; min-height:0; gap:9px; }
    .bubble{ max-width:88%; font-size:12px; }
    .header{ padding:12px 14px; }
    .status{ font-size:9.5px; }
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="frame">
  <div class="header">
    <div class="logo">
  <img
    src="/O.svg"
    alt="Oraami"
    class="ring"
    width="26"
    height="26"
  />
  raami
</div>
    <div class="status"><span class="dot"></span>Building your ICP</div>
  </div>

  <div class="body" id="chatBody"></div>
</div>

<script>
(function(){
  var chatBody = document.getElementById('chatBody');

  var steps = [
    { type:'msg', sender:'ai',   text:"What type of companies are you targeting?" },
    { type:'msg', sender:'user', text:"B2B SaaS companies, 50–500 employees" },
    { type:'msg', sender:'ai',   text:"Got it. What's the job title of your ideal buyer?" },
    { type:'msg', sender:'user', text:"VP of Sales or Head of Revenue" },
    { type:'generating' },
    { type:'card' }
  ];

  var TYPING_DELAY = 850;
  var AFTER_MSG_DELAY = 550;
  var END_HOLD = 3200;
  var timers = [];

  function clearAll(){
    timers.forEach(function(t){ clearTimeout(t); });
    timers = [];
    chatBody.innerHTML = '';
  }

  function makeRow(sender){
    var row = document.createElement('div');
    row.className = 'row ' + sender;
    chatBody.appendChild(row);
    return row;
  }

  function showTyping(sender, cb){
    var row = makeRow(sender);
    var t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });

    var timer = setTimeout(function(){
      t.classList.remove('show');
      t.classList.add('hide');
      var timer2 = setTimeout(function(){
        row.remove();
        cb();
      }, 220);
      timers.push(timer2);
    }, TYPING_DELAY);
    timers.push(timer);
  }

  function showMessage(sender, text, cb){
    var row = makeRow(sender);
    var b = document.createElement('div');
    b.className = 'bubble ' + sender;
    b.textContent = text;
    row.appendChild(b);
    requestAnimationFrame(function(){ b.classList.add('show'); });
    scrollDown();
    var timer = setTimeout(cb, AFTER_MSG_DELAY);
    timers.push(timer);
  }

  function showGenerating(cb){
    var row = makeRow('ai');
    var g = document.createElement('div');
    g.className = 'generating';
    g.innerHTML = '<span class="spinner"></span><span>Generating your ICP…</span>';
    row.appendChild(g);
    requestAnimationFrame(function(){ g.classList.add('show'); });
    scrollDown();

    var timer = setTimeout(function(){
      g.classList.remove('show');
      g.classList.add('hide');
      var timer2 = setTimeout(function(){
        row.remove();
        cb();
      }, 220);
      timers.push(timer2);
    }, 1300);
    timers.push(timer);
  }

  function showCard(cb){
    var card = document.createElement('div');
    card.className = 'icp-card';
    card.innerHTML =
      '<div class="icp-top">' +
        '<div class="icp-title">ICP: B2B SaaS VP Sales</div>' +
        '<div class="badge">Active</div>' +
      '</div>' +
      '<div class="score-label"><span>Specificity Score</span><span class="val" id="scoreVal">0 / 100</span></div>' +
      '<div class="bar-track"><div class="bar-fill" id="barFill"></div></div>' +
      '<div class="icp-stats">' +
        '<div class="icp-stat">Est. Leads:<b id="leadsVal">0</b></div>' +
        '<div class="icp-stat">AI Leads:<b>0</b></div>' +
      '</div>';
    chatBody.appendChild(card);
    requestAnimationFrame(function(){ card.classList.add('show'); });
    scrollDown();

    var timer = setTimeout(function(){
      var fill = document.getElementById('barFill');
      var scoreVal = document.getElementById('scoreVal');
      var leadsVal = document.getElementById('leadsVal');
      fill.style.width = '88%';
      animateCount(scoreVal, 0, 88, 1000, ' / 100');
      animateCount(leadsVal, 0, 25, 1200, '', true);
    }, 200);
    timers.push(timer);

    var timer2 = setTimeout(cb, 1400);
    timers.push(timer2);
  }

  function animateCount(el, from, to, duration, suffix, comma){
    var start = performance.now();
    function frame(t){
      var p = Math.min(1, (t-start)/duration);
      var eased = 1 - Math.pow(1-p, 3);
      var val = Math.round(from + (to-from)*eased);
      var display = comma ? val.toLocaleString() : val;
      el.textContent = display + (suffix||'');
      if (p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function scrollDown(){
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function runStep(i){
    if (i >= steps.length){
      var t = setTimeout(function(){
        clearAll();
        runStep(0);
      }, END_HOLD);
      timers.push(t);
      return;
    }
    var step = steps[i];
    if (step.type === 'msg'){
      showTyping(step.sender, function(){
        showMessage(step.sender, step.text, function(){
          runStep(i+1);
        });
      });
    } else if (step.type === 'generating'){
      showGenerating(function(){
        runStep(i+1);
      });
    } else if (step.type === 'card'){
      showCard(function(){
        runStep(i+1);
      });
    }
  }

  runStep(0);
})();
</script>

</body>
</html>
