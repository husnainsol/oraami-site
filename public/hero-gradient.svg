      <stop offset="0%" stop-color="#ff3a13"/>
      <stop offset="42%" stop-color="#c81418"/>
      <stop offset="100%" stop-color="#02020d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="93%" cy="78%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffd743"/>
